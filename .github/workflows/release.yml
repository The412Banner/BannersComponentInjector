name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.1-pre)'
        required: false

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ] || [ "$TAG" = "refs/heads/main" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          ./gradlew assembleDebug -PversionName="$VERSION"

      - name: Rename APK
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ] || [ "$TAG" = "refs/heads/main" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then TAG="manual"; fi
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             "artifacts/BannersComponentInjector-${TAG}.apk"
          echo "APK_TAG=$TAG" >> $GITHUB_ENV

      - name: Generate release notes
        id: notes
        run: |
          CURRENT="${{ github.ref_name }}"
          # Find the previous tag (skip the current one)
          PREV=$(git tag --sort=-creatordate | grep -v "^${CURRENT}$" | head -1)
          if [ -n "$PREV" ]; then
            COMMITS=$(git log "${PREV}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- docs:" | head -30)
            RANGE="Changes since \`${PREV}\`"
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | grep -v "^- docs:" | head -30)
            RANGE="All changes"
          fi
          echo "PREV_TAG=$PREV" >> $GITHUB_ENV
          # Write multiline to file to avoid quoting issues
          cat > /tmp/release_notes.md << NOTES
          ## Banners Component Injector ${CURRENT}

          ### ${RANGE}
          ${COMMITS}

          ---
          **Installation:** sideload the APK below directly — debug build, no manual signing needed.
          NOTES
          echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/BannersComponentInjector-${{ env.APK_TAG }}.apk
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
          body_path: /tmp/release_notes.md
