name: Beta Build

on:
  push:
    tags:
      - 'beta-v*'

jobs:
  build:
    name: Build Beta APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: |
          TAG="${{ github.ref_name }}"
          # Strip "beta-v" prefix for versionName → e.g. "beta-v1.9.1-b1" → "1.9.1-b1"
          VERSION="${TAG#beta-v}"
          ./gradlew assembleDebug -PversionName="$VERSION"

      - name: Rename APK
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             "artifacts/BannersComponentInjector-${TAG}.apk"
          echo "APK_TAG=$TAG" >> $GITHUB_ENV

      - name: Generate release notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV" ]; then
            COMMITS=$(git log "${PREV}..HEAD" --pretty=format:"- %s" --no-merges | head -30)
            RANGE="Changes since \`${PREV}\`"
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -30)
            RANGE="All changes"
          fi
          cat > /tmp/release_notes.md << NOTES
          ## Beta Build: ${TAG}

          > ⚠️ This is a **draft/beta** build — not for general distribution.

          ### ${RANGE}
          ${COMMITS}

          ---
          **Installation:** sideload the APK below — debug build, no signing needed.
          NOTES

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/BannersComponentInjector-${{ env.APK_TAG }}.apk
          draft: true
          prerelease: false
          generate_release_notes: false
          body_path: /tmp/release_notes.md
          name: "Beta — ${{ github.ref_name }}"
